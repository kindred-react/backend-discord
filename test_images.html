<!DOCTYPE html>
<html>
<head>
    <title>图片显示测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #313338;
            color: white;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            background: #2b2d31;
            border-radius: 8px;
        }
        img {
            max-width: 400px;
            border: 2px solid #5865f2;
            border-radius: 8px;
        }
        .info {
            margin: 10px 0;
            padding: 10px;
            background: #1e1f22;
            border-radius: 4px;
        }
        pre {
            background: #1e1f22;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🖼️ 图片显示测试</h1>
    
    <div class="test-section">
        <h2>测试 1: 直接访问图片</h2>
        <img src="http://localhost:8080/uploads/images/b665ac4c-3619-46e6-80ed-7785fb61949e_1773415819.png" alt="测试图片">
        <div class="info">
            如果上面显示了图片，说明静态文件服务正常。
        </div>
    </div>

    <div class="test-section">
        <h2>测试 2: 获取消息数据</h2>
        <button onclick="fetchMessages()">点击获取消息</button>
        <div id="result"></div>
    </div>

    <script>
        async function fetchMessages() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>加载中...</p>';
            
            try {
                // 从 localStorage 获取 token
                const token = localStorage.getItem('token');
                if (!token) {
                    resultDiv.innerHTML = '<p style="color: red;">错误: 未找到 token，请先登录前端应用</p>';
                    return;
                }

                const response = await fetch('http://localhost:8080/api/channels/aaaaaaaa-aaaa-aaaa-aaaa-111111111111/messages?limit=5&offset=0', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    resultDiv.innerHTML = `<p style="color: red;">错误: ${response.status} ${response.statusText}</p>`;
                    return;
                }

                const data = await response.json();
                const messages = data.messages || data;
                
                let html = '<div class="info"><strong>获取到 ' + messages.length + ' 条消息</strong></div>';
                
                messages.forEach((msg, index) => {
                    html += '<div class="info">';
                    html += '<strong>消息 ' + (index + 1) + ':</strong><br>';
                    html += 'ID: ' + msg.id + '<br>';
                    html += 'Type: ' + msg.type + '<br>';
                    html += 'Content: ' + msg.content + '<br>';
                    
                    if (msg.attachments && msg.attachments.length > 0) {
                        html += '<strong>Attachments:</strong><br>';
                        html += '<pre>' + JSON.stringify(msg.attachments, null, 2) + '</pre>';
                        
                        if (msg.type === 'image') {
                            html += '<img src="' + msg.attachments[0].url + '" alt="消息图片" style="margin-top: 10px;">';
                        }
                    } else {
                        html += '<span style="color: orange;">⚠️ 没有 attachments 数据</span><br>';
                    }
                    
                    html += '</div>';
                });
                
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = '<p style="color: red;">错误: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
