services:
  - name: discord-backend
    region: singapore
    env: go
    buildCommand: go build -o bin/server ./cmd/server
    startCommand: ./bin/server
    envVars:
      - key: SERVER_PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_HOURS
        value: "168"
      - key: DATABASE_URL
        fromDatabase:
          name: discord-db
          property: connectionString
    databases:
      - name: discord-db
        plan: free
        region: singapore
